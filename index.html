<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSIF CASTIONE - GESTIONALE V 1.19.0 BETA</title>
    <style>
        :root { --blue: #003366; --red: #e30613; --bg: #f0f2f5; --white: #ffffff; --grey: #666; --warn: #ffcc00; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        .header { text-align: center; padding: 30px 20px; background: var(--white); border-bottom: 6px solid var(--red); }
        .logo-main { width: 95%; max-width: 1000px; height: auto; }
        .version-label { color: var(--blue); font-weight: 800; font-size: 1.8rem; text-transform: uppercase; margin-top:10px; }

        .nav-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 15px; background: #e9ecef; position: sticky; top:0; z-index: 999; }
        .nav-btn { padding: 12px 20px; border: none; border-radius: 4px; background: var(--blue); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.85rem; }
        .nav-btn:hover { background: #004488; transform: translateY(-2px); }

        .container { display: none; padding: 25px; max-width: 1300px; margin: auto; }
        .active-page { display: block; }
        .card { background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid var(--blue); }
        
        /* STILE INPUT MIGLIORATO */
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
        .input-group input, .input-group select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; transition: all 0.3s; }
        .input-group input:focus { border-color: var(--blue); box-shadow: 0 0 5px rgba(0,51,102,0.2); outline: none; }
        
        .btn-small { padding: 8px 15px; font-size: 0.85rem; cursor: pointer; border-radius: 4px; border: none; color: white; }

        /* TASTI RAPIDI DINAMICI */
        .draggable-area { display: flex; gap: 10px; flex-wrap: wrap; min-height: 50px; padding: 15px; background: #fdfdfd; border-radius: 8px; border: 1px dashed #bbb; margin: 10px 0; }
        .freq-btn { background: #fff; border: 1px solid #ddd; padding: 8px 35px 8px 12px; border-radius: 6px; font-size: 0.85rem; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; min-width: 130px; }
        .btn-controls { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 2px; background: #f0f0f0; border-radius: 4px; padding: 2px; border: 1px solid #ccc; }
        .btn-controls span { cursor: pointer; font-size: 10px; text-align: center; line-height: 1; padding: 2px; }
        .btn-controls span:hover { background: #ddd; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8f9fa; color: var(--blue); padding: 12px; text-align: left; font-size: 0.85rem; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .time-badge { background: #e3f2fd; padding: 4px 8px; border-radius: 4px; font-weight: bold; color: var(--blue); }

        #page_login { position: fixed; top:0; left:0; width: 100%; height: 100%; background: var(--blue); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body>

    <div id="page_login">
        <div style="background:white; padding:40px; border-radius:15px; width:350px; text-align:center;">
            <img src="https://www.securitas.ch/_assets/1f4f58cb8ec7ef7ef807190874a5a8cd/img/logos/securitas.svg" style="width:150px; margin-bottom:20px;">
            <input type="text" id="log_u" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
            <input type="password" id="log_p" placeholder="Password" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px;">
            <button class="nav-btn" style="width:100%; background:var(--red);" onclick="login()">ACCEDI</button>
        </div>
    </div>

    <div id="main_ui" style="display:none;">
        <div class="header">
            <img src="https://it.nsi.ch/wp-content/uploads/2021/05/logo_nsi.png" class="logo-main">
            <div class="version-label">NSIF CASTIONE – GESTIONALE V 1.19.0</div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn" onclick="showSection('section_fornitori')">GESTIONE FORNITORI</button>
            <button class="nav-btn" onclick="showSection('section_badge')">BADGE / WORKFLOW</button>
            <button class="nav-btn" id="nav_admin" style="display:none; background:#333;" onclick="showSection('section_admin')">ADMIN</button>
            <button class="nav-btn" style="background:#666;" onclick="location.reload()">LOGOUT</button>
        </div>

        <div id="section_fornitori" class="container active-page">
            <div class="card">
                <h3>Nuovo Ingresso Fornitore</h3>
                <div class="input-group">
                    <input type="text" id="f_azienda" placeholder="Ditta / Azienda">
                    <input type="text" id="f_autista" placeholder="Nome Cognome Autista">
                    <input type="text" id="f_targa" placeholder="Targa Mezzo">
                    <select id="f_varco_in" title="Varco di Accesso"></select>
                    <input type="number" id="f_timeout" value="15" title="Minuti permanenza">
                </div>
                
                <div style="display:flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap:10px;">
                    <div style="display:flex; gap:15px; align-items: center; background: #eee; padding: 10px; border-radius: 6px;">
                        <label><input type="checkbox" id="f_casco"> 🪖 Casco</label>
                        <label><input type="checkbox" id="f_gilet"> 🦺 Gilet</label>
                        <input type="text" id="f_nota_dpi" placeholder="Note DPI" style="width:150px; padding:5px; border-radius:4px; border:1px solid #ccc;">
                    </div>
                    <button class="nav-btn btn-small" style="background:green; font-weight: bold;" onclick="addFornitore()">REGISTRA ENTRATA</button>
                </div>

                <div style="margin-top:20px;">
                    <small><b>MEZZI FREQUENTI:</b> (▲▼ sposta, ✖ cancella)</small>
                    <div id="recenti_area" class="draggable-area"></div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Azienda</th><th>Targa / Autista</th><th>Varco IN</th><th>Ora IN</th><th>Varco OUT</th><th>Ora OUT</th><th>DPI</th><th>Azione</th>
                        </tr>
                    </thead>
                    <tbody id="tbody_fornitori"></tbody>
                </table>
                <div id="counter_box" style="margin-top:20px; padding:15px; background:#e3f2fd; border-radius:8px; display:flex; justify-content: space-around; font-weight:bold;"></div>
            </div>
        </div>

        <div id="section_badge" class="container">
            <div class="card">
                <h3>Workflow Operativi</h3>
                <div id="badge_start_btns"></div>
                <div id="flow_render_area"></div>
            </div>
        </div>

        <div id="section_admin" class="container">
            <div class="card">
                <h3>Amministrazione Sistema</h3>
                <div id="admin_varchi_area">
                    <h4>Varchi Predefiniti</h4>
                    <input type="text" id="adm_v_nome" placeholder="Nome Varco">
                    <button onclick="addVarco()">Aggiungi Varco</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('nsif_v19_db')) || {
            users: [{e: "admin", p: "admin", l: "admin", s: true}],
            fornitori: [], predefiniti: [], varchi: [{nome: 'CAST09'}], recenti: [], workflows: []
        };
        let currentUser = null;

        function save() { localStorage.setItem('nsif_v19_db', JSON.stringify(db)); }

        function login() {
            const u = document.getElementById('log_u').value;
            const p = document.getElementById('log_p').value;
            const user = db.users.find(x => x.e === u && x.p === p);
            if(user) {
                currentUser = user;
                document.getElementById('page_login').style.display = 'none';
                document.getElementById('main_ui').style.display = 'block';
                if(user.l === 'admin') document.getElementById('nav_admin').style.display = 'block';
                renderFornitori();
            } else alert("Dati errati");
        }

        function showSection(id) {
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function addVarco() {
            const n = document.getElementById('adm_v_nome').value;
            if(n) { db.varchi.push({nome: n.toUpperCase()}); save(); renderFornitori(); }
        }

        function addFornitore() {
            const azi = document.getElementById('f_azienda').value.toUpperCase();
            const tar = document.getElementById('f_targa').value.toUpperCase().replace(/\s/g, '');
            if(!azi || !tar) return alert("Ditta e Targa obbligatorie!");

            const entry = {
                id: Date.now(), data: new Date().toLocaleDateString('it-IT'),
                azienda: azi, autista: document.getElementById('f_autista').value.toUpperCase(),
                targa: tar, casco: document.getElementById('f_casco').checked, gilet: document.getElementById('f_gilet').checked,
                entrata: new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}),
                entrata_ts: Date.now(), uscita: null, varco_entrata: document.getElementById('f_varco_in').value || 'CAST09',
                varco_uscita: ""
            };

            db.fornitori.push(entry);
            // Crea tasto rapido se non esiste in admin o nei recenti [cite: 315]
            if(!db.recenti.find(r => r.targa === tar)) {
                db.recenti.push({azienda: azi, autista: entry.autista, targa: tar, casco: entry.casco, gilet: entry.gilet});
            }
            save(); renderFornitori();
            ['f_azienda','f_autista','f_targa'].forEach(i => document.getElementById(i).value = "");
        }

        function renderFornitori() {
            const oggi = new Date().toLocaleDateString('it-IT');
            const listaOggi = (db.fornitori || []).filter(f => f.data === oggi);
            
            // Popola Select Varchi [cite: 318]
            document.getElementById('f_varco_in').innerHTML = db.varchi.map(v => `<option value="${v.nome}">${v.nome}</option>`).join('');

            // Render Tasti Rapidi con controlli spostamento [cite: 319]
            document.getElementById('recenti_area').innerHTML = db.recenti.map((r, i) => `
                <div class="freq-btn">
                    <span onclick="recallFornitore('${r.azienda}','${r.autista}','${r.targa}',${r.casco},${r.gilet})">
                        <b>${r.targa}</b><br><small>${r.azienda}</small>
                    </span>
                    <div class="btn-controls">
                        <span onclick="moveRecente(${i},-1)">▲</span>
                        <span onclick="delRecente('${r.targa}')" style="color:red">✖</span>
                        <span onclick="moveRecente(${i},1)">▼</span>
                    </div>
                </div>
            `).join('');

            // Tabella con colonna ORA ENTRATA di fianco al varco [cite: 321]
            document.getElementById('tbody_fornitori').innerHTML = listaOggi.map(f => `
                <tr class="${!f.uscita ? 'row-in-cantiere' : ''}">
                    <td>${f.azienda}</td>
                    <td>${f.targa}<br><small>${f.autista}</small></td>
                    <td>${f.varco_entrata}</td>
                    <td><span class="time-badge">${f.entrata}</span></td>
                    <td>${f.varco_uscita || '-'}</td>
                    <td><span class="time-badge" style="background:#ffebee">${f.uscita || '--:--'}</span></td>
                    <td>${f.casco?'✅':'❌'}${f.gilet?'✅':'❌'}</td>
                    <td>${f.uscita ? 'OK' : `<button class="btn-small" style="background:var(--red)" onclick="registraUscita(${f.id})">ESCI</button>`}</td>
                </tr>
            `).reverse().join('');
            
            const inC = listaOggi.filter(x => !x.uscita).length;
            document.getElementById('counter_box').innerHTML = `<span>TRANSITI: ${listaOggi.length}</span> <span style="color:red">IN CANTIERE: ${inC}</span>`;
        }

        function recallFornitore(az, aut, tar, c, g) {
            document.getElementById('f_azienda').value = az;
            document.getElementById('f_autista').value = aut;
            document.getElementById('f_targa').value = tar;
            document.getElementById('f_casco').checked = c;
            document.getElementById('f_gilet').checked = g;
        }

        function moveRecente(index, direction) {
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < db.recenti.length) {
                const item = db.recenti.splice(index, 1)[0];
                db.recenti.splice(newIndex, 0, item);
                save(); renderFornitori();
            }
        }

        function delRecente(targa) {
            if(confirm("Eliminare tasto rapido?")) {
                db.recenti = db.recenti.filter(r => r.targa !== targa);
                save(); renderFornitori();
            }
        }

        function registraUscita(id) {
            const f = db.fornitori.find(x => x.id === id);
            // Conferma o cambio varco uscita [cite: 328, 329]
            let vOut = prompt(`Conferma varco USCITA per ${f.targa}:`, f.varco_entrata);
            if(vOut) {
                f.uscita = new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
                f.varco_uscita = vOut.toUpperCase();
                save(); renderFornitori();
            }
        }
    </script>
</body>
</html>
